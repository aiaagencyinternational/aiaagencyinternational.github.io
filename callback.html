<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Authorization complete — AIA Studios</title>
<style>
  :root{color-scheme:dark}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
       background:#0b0b0f;color:#e9e9ee;line-height:1.6;display:flex;min-height:100vh;align-items:center;justify-content:center}
  .box{max-width:620px;padding:32px;background:#15151d;border:1px solid #23232e;border-radius:14px;margin:20px}
  code{display:block;background:#0b0b0f;border:1px solid #2a2a36;border-radius:8px;padding:14px;
       word-break:break-all;margin:12px 0;color:#8affc1}
  button{background:#ff2d55;color:#fff;border:0;border-radius:8px;padding:10px 16px;font-weight:600;cursor:pointer}
  .muted{color:#8a8a97;font-size:.92rem}
  h1{font-size:1.4rem}
</style>
</head>
<body>
<div class="box">
  <h1 id="title">Authorization received ✓</h1>
  <p class="muted">Copy the value below and send it back to complete the setup. This code is short-lived.</p>
  <code id="code">reading…</code>
  <button onclick="copyCode()">Copy code</button>
  <p class="muted" id="state"></p>
</div>
<script>
  var p = new URLSearchParams(location.search);
  var code = p.get('code');
  var err = p.get('error') || p.get('error_description');
  var el = document.getElementById('code');
  if (code) { el.textContent = code; }
  else if (err) { document.getElementById('title').textContent = 'Authorization error'; el.textContent = err; }
  else { el.textContent = 'No authorization code found in the URL.'; }
  var st = p.get('state'); if (st) document.getElementById('state').textContent = 'state: ' + st;
  function copyCode(){ navigator.clipboard.writeText(el.textContent); }
</script>
</body>
</html>
